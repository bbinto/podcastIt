<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PodcastIt</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      width: 340px;
      padding: 16px;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 4px;
      color: #a78bfa;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 span.icon { font-size: 22px; }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    #settingsToggleBtn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 4px;
      color: #666;
      flex: 0 0 auto;
      width: auto;
      transition: color 0.2s;
    }
    #settingsToggleBtn:hover { color: #a78bfa; background: none; }
    p.subtitle {
      font-size: 12px;
      color: #888;
      margin: 0 0 14px;
    }
    #status {
      font-size: 12px;
      min-height: 18px;
      margin-bottom: 10px;
      color: #a78bfa;
    }
    #status.error   { color: #f87171; }
    #status.success { color: #34d399; }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    button {
      flex: 1;
      padding: 9px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover  { background: #6d28d9; }
    button:disabled { background: #4a4a6a; cursor: not-allowed; }
    #logToggleBtn {
      flex: 0 0 auto;
      background: #2d2d50;
      font-size: 12px;
      padding: 9px 12px;
    }
    #logToggleBtn:hover { background: #3a3a6a; }

    /* Settings panel */
    #settingsPanel {
      display: none;
      background: #12122a;
      border: 1px solid #2d2d50;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    #settingsPanel.open { display: block; }
    .settings-title {
      font-size: 11px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }
    .field { margin-bottom: 8px; }
    .field label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 3px;
    }
    .field input {
      width: 100%;
      background: #1a1a2e;
      border: 1px solid #3a3a6a;
      border-radius: 5px;
      color: #e0e0e0;
      font-size: 12px;
      padding: 5px 8px;
      outline: none;
    }
    .field input:focus { border-color: #7c3aed; }
    .settings-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      align-items: center;
    }
    #saveSettingsBtn {
      flex: 1;
      padding: 6px;
      font-size: 12px;
    }
    #pingBtn {
      flex: 0 0 auto;
      background: #2d2d50;
      font-size: 12px;
      padding: 6px 10px;
    }
    #pingBtn:hover { background: #3a3a6a; }
    #pingStatus {
      font-size: 11px;
      color: #888;
      margin-top: 6px;
      min-height: 14px;
    }
    #pingStatus.ok  { color: #34d399; }
    #pingStatus.err { color: #f87171; }

    /* Server toggle */
    .toggle-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .toggle-btn {
      flex: 1;
      padding: 5px;
      font-size: 11px;
      background: #1a1a2e;
      border: 1px solid #3a3a6a;
      border-radius: 5px;
      color: #888;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .toggle-btn.active {
      background: #7c3aed;
      border-color: #7c3aed;
      color: #fff;
    }
    .toggle-btn:hover:not(.active) { border-color: #a78bfa; color: #a78bfa; }

    /* Log panel */
    #logPanel {
      display: none;
      border-top: 1px solid #2d2d50;
      padding-top: 10px;
    }
    #logPanel.open { display: block; }
    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .log-header span {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #clearLogsBtn {
      flex: 0 0 auto;
      background: #3a1a1a;
      color: #f87171;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      padding: 3px 8px;
      cursor: pointer;
    }
    #clearLogsBtn:hover { background: #5a2a2a; }
    #logEntries {
      max-height: 200px;
      overflow-y: auto;
      background: #0f0f1e;
      border-radius: 6px;
      padding: 8px;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      line-height: 1.5;
    }
    #logEntries::-webkit-scrollbar { width: 4px; }
    #logEntries::-webkit-scrollbar-thumb { background: #3a3a6a; border-radius: 2px; }
    .log-entry { display: flex; gap: 6px; }
    .log-ts    { color: #555; flex-shrink: 0; }
    .log-level { flex-shrink: 0; font-weight: 700; width: 38px; }
    .log-msg   { color: #ccc; word-break: break-word; }
    .log-level.INFO  { color: #60a5fa; }
    .log-level.WARN  { color: #fbbf24; }
    .log-level.ERROR { color: #f87171; }
    .log-msg.ERROR   { color: #fca5a5; }
    #noLogs { color: #555; font-size: 11px; text-align: center; padding: 8px 0; }

    /* Last job result card */
    #lastJob {
      display: none;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 12px;
      line-height: 1.5;
    }
    #lastJob.success {
      display: block;
      background: #0d2b1e;
      border: 1px solid #166534;
    }
    #lastJob.error {
      display: block;
      background: #2b0d0d;
      border: 1px solid #7f1d1d;
    }
    #lastJob .job-header {
      font-weight: 700;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #lastJob.success .job-header { color: #34d399; }
    #lastJob.error   .job-header { color: #f87171; }
    #lastJob .job-file {
      color: #a0a0c0;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      word-break: break-all;
    }
    #lastJob .job-time { color: #555; font-size: 10px; margin-top: 3px; }
    #lastJob .job-error-msg {
      color: #fca5a5;
      font-size: 11px;
      margin-top: 2px;
      word-break: break-word;
    }

    .info {
      font-size: 11px;
      color: #555;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="title-row">
    <h1><span class="icon">🎙️</span> PodcastIt</h1>
    <button id="settingsToggleBtn" title="Settings">⚙️</button>
  </div>
  <p class="subtitle">Highlight text or use full page — then hit Convert.</p>

  <!-- Settings panel -->
  <div id="settingsPanel">
    <div class="settings-title">Server Settings</div>
    <div class="field">
      <label>Connection Mode</label>
      <div class="toggle-row">
        <button class="toggle-btn" id="modeLocalBtn">Local IP</button>
        <button class="toggle-btn" id="modeNgrokBtn">ngrok</button>
      </div>
    </div>
    <div class="field" id="localUrlField">
      <label>Local Server URL</label>
      <input id="localUrlInput" type="text" placeholder="http://10.88.111.48:5050" />
    </div>
    <div class="field" id="ngrokUrlField" style="display:none">
      <label>ngrok URL</label>
      <input id="ngrokUrlInput" type="text" placeholder="https://xxxx.ngrok-free.app" />
    </div>
    <div class="field">
      <label>API Token</label>
      <input id="apiTokenInput" type="password" placeholder="your-secret-token" />
    </div>
    <div class="settings-row">
      <button id="saveSettingsBtn">Save</button>
      <button id="pingBtn">Ping</button>
    </div>
    <div id="pingStatus"></div>
  </div>

  <!-- Last job result card -->
  <div id="lastJob">
    <div class="job-header"><span id="jobIcon"></span><span id="jobHeadline"></span></div>
    <div class="job-file" id="jobFile"></div>
    <div class="job-error-msg" id="jobErrorMsg"></div>
    <div class="job-time" id="jobTime"></div>
  </div>

  <div id="status">Ready.</div>

  <div class="btn-row">
    <button id="convertBtn">Convert to Podcast</button>
    <button id="logToggleBtn" title="View logs">📋 Logs</button>
  </div>

  <div id="logPanel">
    <div class="log-header">
      <span>Extension Log</span>
      <button id="clearLogsBtn">Clear</button>
    </div>
    <div id="logEntries"><div id="noLogs">No logs yet.</div></div>
  </div>

  <div class="info">Uses selected text or full page if nothing selected.</div>
  <script src="popup.js"></script>
</body>
</html>
